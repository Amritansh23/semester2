body{

/* Animated Background */
.header{
       margin-top: 1%;margin-left: 1%; margin-right: 1%;background: linear-gradient(270deg, #ff9966, #ff5e62, #845ec2);
       background-size: 400% 400%;animation: gradientMove 8s ease infinite;padding: 40px;text-align: center;
       border-radius: 18px;
    
}

/* Gradient Animation */
@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}


/* Stylish Heading */
.header h2{
       margin-top: 0%;font-size: 100px;color: darkblue;font-weight: bold; letter-spacing: 3px;text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    animation: bounce 2s infinite;
}

/* Text Bounce Animation */
@keyframes bounce{
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}
/* Search Box */
.search-box{
    padding: 20px; width: 500px; border-radius: 30px; border: none; outline: none; margin: 0;
}

/* Button */
.btn{
    padding: 10px 20px;border-radius: 30px;border: none;background-color: black;color: white;cursor: pointer;transition: 0.3s;
}

/* Button Hover Effect */
.btn:hover{
    background-color: white;color: black;transform: scale(1.1);
}

</style>
